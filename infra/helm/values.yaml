# ContextForge Helm values — Minikube (Phase 2)
#
# Overrides for the upstream chart at .contextforge/charts/mcp-stack
# These merge on top of the upstream defaults via:
#   helm upgrade --install ... -f infra/helm/values.yaml
#
# WARNING: secrets here are dev-only placeholders.
# Phase 3 (AKS) will replace these with Azure Key Vault CSI driver refs.

mcpContextForge:

  # ── Replicas & scaling ─────────────────────────────────────────────────────
  replicaCount: 1                       # single replica for local k8s

  hpa:
    enabled: false                      # HPA needs metrics-server and more RAM

  # ── Image ──────────────────────────────────────────────────────────────────
  image:
    repository: ghcr.io/ibm/mcp-context-forge
    tag: "v1.0.4"                       # pinned — never use 'latest' (per CLAUDE.md)
    pullPolicy: IfNotPresent            # use local cache; avoids re-pull in minikube

  # ── Resource limits ────────────────────────────────────────────────────────
  # Reduced from upstream defaults (2 CPU / 2Gi) to fit a dev laptop
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # ── Ingress ────────────────────────────────────────────────────────────────
  ingress:
    enabled: true
    className: nginx
    # The chart hardcodes force-ssl-redirect=true on this ingress, which 308-
    # redirects every request (including /health) to https://gateway.local even
    # though TLS is off on minikube. These user annotations merge on top of the
    # chart defaults and turn the redirect off for plain-HTTP local dev.
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    host: gateway.local
    path: /
    pathType: Prefix
    tls:
      enabled: false                    # no cert-manager on Minikube

  # ── Metrics / ServiceMonitor ───────────────────────────────────────────────
  # In-app Prometheus metrics stay ON, but the ServiceMonitor CRD object is
  # disabled. Minikube has no Prometheus Operator, so monitoring.coreos.com/v1
  # is not a registered kind and Helm cannot render that resource ("no matches
  # for kind ServiceMonitor"). Re-enable in the observability phase after
  # installing kube-prometheus-stack (which provides the CRD).
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false

  # ── Non-secret config overrides ────────────────────────────────────────────
  config:
    # HTTP server
    HTTP_SERVER: "gunicorn"
    GUNICORN_WORKERS: "2"

    # CORS — gateway.local only
    ENVIRONMENT: development
    APP_DOMAIN: "http://gateway.local"
    ALLOWED_ORIGINS: '["http://gateway.local"]'

    # SSRF — allow in-cluster service DNS (postgres/redis pods) and localhost
    SSRF_ALLOW_LOCALHOST: "true"
    SSRF_ALLOW_PRIVATE_NETWORKS: "true"
    SSRF_DNS_FAIL_CLOSED: "false"

    # Relaxed security headers for local dev
    HSTS_ENABLED: "false"
    SECURE_COOKIES: "false"
    COOKIE_SAMESITE: "lax"

    # Password policy — relaxed for dev convenience
    PASSWORD_CHANGE_ENFORCEMENT_ENABLED: "false"
    ADMIN_REQUIRE_PASSWORD_CHANGE_ON_BOOTSTRAP: "false"
    DETECT_DEFAULT_PASSWORD_ON_LOGIN: "false"
    REQUIRE_PASSWORD_CHANGE_FOR_DEFAULT_PASSWORD: "false"

    # Logging
    LOG_LEVEL: INFO
    LOG_FORMAT: json
    DISABLE_ACCESS_LOG: "false"         # keep access logs on in dev

    # Metrics
    ENABLE_METRICS: "true"

  # ── Admin UI ── injected via extraEnv (not in upstream config section) ─────
  extraEnv:
    - name: MCPGATEWAY_UI_ENABLED
      value: "true"
    - name: MCPGATEWAY_ADMIN_API_ENABLED
      value: "true"

  # ── Secrets ────────────────────────────────────────────────────────────────
  # DEV ONLY — change every value before any non-local deployment
  secret:
    # Auth
    JWT_SECRET_KEY: "minikube-dev-jwt-secret-change-me-min32"
    AUTH_ENCRYPTION_SECRET: "minikube-dev-enc-salt-change-me-32c"

    # Admin bootstrap
    PLATFORM_ADMIN_EMAIL: "admin@example.com"
    PLATFORM_ADMIN_PASSWORD: "changeme"
    PLATFORM_ADMIN_FULL_NAME: "Platform Administrator"
    DEFAULT_USER_PASSWORD: "changeme"

    # Auth mode
    EMAIL_AUTH_ENABLED: "true"
    AUTH_REQUIRED: "true"
    MCP_REQUIRE_AUTH: "true"

    # Min secret length — upstream default is 32; our dev keys satisfy that
    MIN_SECRET_LENGTH: "32"
    REQUIRE_STRONG_SECRETS: "false"     # allow short dev secrets

# ── Migration job ─────────────────────────────────────────────────────────────
# Disabled for local single-replica minikube. The chart ships migrations as a
# Helm *post-install* hook Job, which Helm only runs AFTER `--wait` finds the
# gateway Deployment ready. But the gateway hard-fails on boot until the schema
# is at head (MCPGATEWAY_SKIP_MIGRATIONS is forced true when migration.enabled),
# so the Deployment never becomes ready, the hook never runs, and `helm install`
# times out. With migration.enabled=false the chart sets SKIP_MIGRATIONS=false
# and each gateway pod runs the advisory-lock migration itself on boot — the
# chart documents this as safe for single-replica. Re-enable the dedicated Job
# for multi-replica / AKS (values.azure.yaml), where Postgres is managed apart.
migration:
  enabled: false
  image:
    tag: "v1.0.4"                       # must match mcpContextForge.image.tag
