# SecretProviderClass — Key Vault CSI integration for the self-hosted GitHub MCP server
#
# Kept separate from infra/k8s/secret-provider-class.yaml (ContextForge control-plane
# secrets) on purpose: the GitHub PAT is a workload credential for one federated MCP
# server, not a gateway secret. Separate SecretProviderClass -> separate k8s Secret ->
# only the github-mcp-server pod's ServiceAccount/volume mount can ever see it. This is
# the same separation-of-concerns pattern to reuse for the Step 3-5 servers (Azure
# DevOps PAT, Prometheus/K8s creds if any) — one SecretProviderClass + Secret per
# workload, not a shared blob of every credential.
#
# Prerequisites:
#   - AKS deployed with azureKeyvaultSecretsProvider add-on (set by Bicep)
#   - A DEDICATED identity for this workload, not the CSI add-on's own identity —
#     see infra/bicep/modules/workload-identity.bicep, instantiated in main.bicep
#     as `githubMcpIdentity`. Run `make bicep-deploy` to provision it, then:
#       az identity show -g rg-contextforge-dev -n id-github-mcp-server --query clientId -o tsv
#     (make github-mcp-deploy does this lookup automatically).
#     INCIDENT NOTE (2026-07-02): this file originally pointed clientID at
#     addonProfiles.azureKeyvaultSecretsProvider's own identity, which has no
#     federated identity credential for application ServiceAccounts to use —
#     every mount failed with AADSTS70025 "has no configured federated identity
#     credentials". That identity is for the CSI driver's own internal use and
#     is already vault-wide privileged; federating a workload against it is both
#     broken (no FIC exists) and the wrong scope even if it worked. Use the
#     dedicated per-workload identity below instead. See runbook Step 2 for the
#     full writeup.
#   - Key Vault populated with `github-mcp-pat` (see Makefile kv-populate output —
#     this one is NOT auto-generated, it must be created manually as a GitHub
#     fine-grained PAT, then set with:)
#       az keyvault secret set --vault-name kv-contextforge-dev \
#         --name github-mcp-pat --value "<fine-grained PAT>"
#
# PAT generation guidance (fine-grained, not classic — classic PATs are org/account
# -wide and cannot be scoped to specific repos):
#   1. https://github.com/settings/personal-access-tokens/new
#   2. Resource owner: a dedicated machine/bot account or the org, NOT a human's
#      personal account — the token must outlive any one engineer's tenure.
#   3. Repository access: "Only select repositories" — scope to exactly what this
#      SRE toolbox needs, not "All repositories".
#   4. Permissions — matches GITHUB_TOOLSETS="repos,issues,pull_requests,actions"
#      + --read-only baked into services/github-mcp-wrapper/Dockerfile. Set every
#      one of these to Read-only (no repo needs Read and write):
#        - Metadata        (mandatory baseline — GitHub requires this on every
#                            fine-grained token regardless of scope)
#        - Contents         (repos toolset: file/branch/commit/tag/release reads)
#        - Issues           (issues toolset)
#        - Pull requests    (pull_requests toolset)
#        - Actions          (actions toolset: workflow/run/job/log reads)
#      Provision these as Read-only even though --read-only already strips write
#      tools at the app layer — defense in depth in case that flag is ever
#      dropped from a future image build.
#      Not needed: `issues` toolset's list_issue_types tool wants org-level
#      read:org and will just no-op without it — harmless to omit.
#      If a write toolset is ever added later, note Contents: Read and write does
#      NOT cover changes to .github/workflows/*.yml — that needs the separate
#      "Workflows" permission on fine-grained tokens.
#   5. Expiration: set the shortest expiration GitHub allows (max 1 year) and put
#      a calendar reminder to rotate — fine-grained PATs cannot yet auto-rotate.
#      GitHub App installation-token auth would remove this manual rotation
#      entirely, but is not currently usable with github-mcp-server (see
#      github/github-mcp-server#1610 — forced /user check breaks App auth as of
#      this writing). Revisit once that's fixed upstream.
#
# Apply BEFORE running github-mcp-deploy:
#   kubectl apply -f infra/k8s/github-mcp-secrets-provider.yaml -n mcp

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: github-mcp-kv-secrets
  namespace: mcp
spec:
  provider: azure

  parameters:
    # ── REPLACE THESE THREE VALUES ───────────────────────────────────────────
    tenantId: "<TENANT_ID>"                       # az account show --query tenantId -o tsv
    keyvaultName: "<KV_NAME>"                     # e.g. kv-contextforge-dev
    clientID: "<GITHUB_MCP_IDENTITY_CLIENT_ID>"   # Bicep output githubMcpIdentityClientId —
                                                    # NOT csiDriverIdentityObjectId, see note above
    # ──────────────────────────────────────────────────────────────────────────

    usePodIdentity: "false"
    useVMManagedIdentity: "false"        # workload identity (OIDC) preferred
    cloudName: ""

    objects: |
      array:
        - |
          objectName: github-mcp-pat
          objectType: secret
          objectAlias: github-mcp-pat

  # Sync into a Secret scoped to this one workload — referenced via secretKeyRef
  # in infra/k8s/github-mcp-server.yaml, not envFrom, so the pod only ever gets
  # the one key it needs.
  secretObjects:
    - secretName: github-mcp-secrets
      type: Opaque
      data:
        - objectName: github-mcp-pat
          key: GITHUB_PERSONAL_ACCESS_TOKEN
