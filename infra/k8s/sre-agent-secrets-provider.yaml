# SecretProviderClass — Key Vault CSI integration for the sre-agent (Phase 5).
#
# Same one-SecretProviderClass-per-workload pattern as
# azure-devops-mcp-secrets-provider.yaml / github-mcp-secrets-provider.yaml.
# This workload is unusual among Phase 4/5 services in needing TWO secrets:
#   - anthropic-api-key   — real API key from console.anthropic.com. Not the
#     same credential as a Claude Code subscription/OAuth login; the Claude
#     Agent SDK's `claude` CLI subprocess needs a plain ANTHROPIC_API_KEY to
#     run unattended in a container with no interactive login.
#   - sre-agent-jwt-token — the team+server-scoped ContextForge token minted
#     in 5.1 via `make mcp-create-scoped-token` (non-admin, sre-team-scoped —
#     see CLAUDE.md Phase 5.1 for why this must not be a platform-admin token).
#
# Prerequisites:
#   - AKS deployed with azureKeyvaultSecretsProvider add-on (set by Bicep)
#   - Dedicated identity `sreAgentIdentity` (infra/bicep/modules/workload-identity.bicep,
#     instantiated in main.bicep). Run `make bicep-deploy` to provision it, then:
#       az identity show -g rg-contextforge-dev -n id-sre-agent --query clientId -o tsv
#     (make sre-agent-deploy does this lookup automatically, same as the other
#     Phase 4 *-mcp-deploy targets.)
#   - Key Vault populated with both secrets above — anthropic-api-key must be
#     set manually (not part of `make kv-populate`):
#       az keyvault secret set --vault-name kv-contextforge-dev \
#         --name anthropic-api-key --value "<your key>"
#     sre-agent-jwt-token is set by `make mcp-create-scoped-token` (5.1).
#
# Apply BEFORE running sre-agent-deploy:
#   kubectl apply -f infra/k8s/sre-agent-secrets-provider.yaml -n mcp

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: sre-agent-kv-secrets
  namespace: mcp
spec:
  provider: azure

  parameters:
    # ── REPLACE THESE THREE VALUES ───────────────────────────────────────────
    tenantId: "<TENANT_ID>"                    # az account show --query tenantId -o tsv
    keyvaultName: "<KV_NAME>"                  # e.g. kv-contextforge-dev
    clientID: "<SRE_AGENT_IDENTITY_CLIENT_ID>" # Bicep output sreAgentIdentityClientId
    # ──────────────────────────────────────────────────────────────────────────

    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    cloudName: ""

    objects: |
      array:
        - |
          objectName: anthropic-api-key
          objectType: secret
          objectAlias: anthropic-api-key
        - |
          objectName: sre-agent-jwt-token
          objectType: secret
          objectAlias: sre-agent-jwt-token

  secretObjects:
    - secretName: sre-agent-secrets
      type: Opaque
      data:
        - objectName: anthropic-api-key
          key: ANTHROPIC_API_KEY
        - objectName: sre-agent-jwt-token
          key: SRE_AGENT_JWT
