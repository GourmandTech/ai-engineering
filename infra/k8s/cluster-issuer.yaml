---
# cert-manager ClusterIssuer — Let's Encrypt production
#
# Uses HTTP-01 challenge: cert-manager creates a temporary Ingress that
# Let's Encrypt's servers hit to verify domain ownership.
#
# Prerequisite: DNS A record must point to the nginx ingress external IP
#   before applying this and deploying ContextForge with TLS enabled.
#
# Apply:
#   kubectl apply -f infra/k8s/cluster-issuer.yaml
#
# Verify:
#   kubectl get clusterissuer letsencrypt-prod
#   kubectl describe clusterissuer letsencrypt-prod

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: david.fernandez@gourmandtech.net
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
