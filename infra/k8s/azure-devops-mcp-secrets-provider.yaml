# SecretProviderClass — Key Vault CSI integration for the self-hosted Azure
# DevOps MCP server.
#
# Same separation-of-concerns pattern as github-mcp-secrets-provider.yaml: one
# SecretProviderClass + Secret per workload, not a shared blob of every
# credential. The Azure DevOps PAT is a workload credential for this one
# federated MCP server.
#
# Prerequisites:
#   - AKS deployed with azureKeyvaultSecretsProvider add-on (set by Bicep)
#   - A DEDICATED identity for this workload, not the CSI add-on's own
#     identity and not the GitHub MCP identity — see
#     infra/bicep/modules/workload-identity.bicep, instantiated in main.bicep
#     as `azureDevOpsMcpIdentity`. Run `make bicep-deploy` to provision it, then:
#       az identity show -g rg-contextforge-dev -n id-azure-devops-mcp-server --query clientId -o tsv
#     (make azure-devops-mcp-deploy does this lookup automatically, same as
#     github-mcp-deploy). See runbook Step 2 for the AADSTS70025 incident that
#     is why this dedicated-identity-per-workload pattern exists at all.
#   - Key Vault populated with `azure-devops-mcp-pat` (NOT auto-generated by
#     `make kv-populate` — it must be created manually, then set with:)
#       az keyvault secret set --vault-name kv-contextforge-dev \
#         --name azure-devops-mcp-pat --value "<base64 of email:pat>"
#     NOTE the value stored here is already base64-encoded "<email>:<pat>" —
#     see PAT generation guidance below. This differs from github-mcp-pat,
#     which stores the raw fine-grained PAT with no encoding step. Getting
#     this wrong doesn't error loudly — it authenticates as garbage and every
#     tool call fails with an auth error that looks unrelated to encoding, so
#     it's called out explicitly here.
#
# PAT generation guidance (per-scope, not classic all-org-access tokens):
#   1. https://dev.azure.com/<org>/_usersSettings/tokens
#   2. Organization: scope to the specific org this deployment targets, not
#      "All accessible organizations".
#   3. Expiration: shortest Azure DevOps allows (max 1 year) — put a calendar
#      reminder to rotate. Azure DevOps PATs have no auto-rotation mechanism;
#      same manual-rotation caveat as the GitHub fine-grained PAT (see
#      github-mcp-secrets-provider.yaml), and the same note applies: the
#      `azcli` auth mode would avoid PAT rotation entirely by using short-lived
#      `az login` tokens, but that requires a live Azure CLI session inside
#      the pod, which is a bigger operational lift than PAT rotation for a
#      single-replica in-cluster workload — PAT is the pragmatic choice here.
#   4. Scopes — matches the domains baked into
#      services/azure-devops-mcp-wrapper/entrypoint.sh (-d core work-items
#      pipelines — NOT repositories, see entrypoint.sh for why: the combined
#      tools/list response with repositories included exceeds
#      mcpgateway.translate's 64 KiB stdout line limit, and this org's source
#      code lives in GitHub anyway, already federated via github-mcp-server).
#      Set every one of these to its Read-only variant (confirmed scope names
#      from Microsoft Learn's PAT documentation):
#        - Project and Team (Read)   — core domain: list/read projects, teams
#        - Work Items (Read)         — work-items domain
#        - Build (Read)              — pipelines domain: build definitions/runs
#      Do NOT grant Code (Read) — it's the repositories-domain scope and this
#      PAT has no use for it; least privilege means matching the scope to
#      what's actually exposed, not what the PAT could theoretically reach.
#      Not included: Release (Read) — only needed if this org uses classic
#      Release pipelines (as opposed to YAML/Build pipelines); add it if tool
#      calls against release pipelines start failing with 403s.
#      This PAT scoping is the actual read-only enforcement for this
#      deployment — unlike GitHub MCP, the upstream server has no --read-only
#      CLI flag (see entrypoint.sh), so an over-scoped PAT here is a real gap,
#      not defense-in-depth on top of an app-layer restriction.
#   5. Resulting token from step 4 must be base64-encoded together with an
#      email before it goes into Key Vault:
#        printf '%s' "any-non-empty-string@example.com:<raw-pat>" | base64
#      The <email> portion is not validated by Azure DevOps — the API only
#      uses the PAT half — but it must be present and the whole string must be
#      valid base64, or auth fails.
#
# Apply BEFORE running azure-devops-mcp-deploy:
#   kubectl apply -f infra/k8s/azure-devops-mcp-secrets-provider.yaml -n mcp

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-devops-mcp-kv-secrets
  namespace: mcp
spec:
  provider: azure

  parameters:
    # ── REPLACE THESE THREE VALUES ───────────────────────────────────────────
    tenantId: "<TENANT_ID>"                             # az account show --query tenantId -o tsv
    keyvaultName: "<KV_NAME>"                           # e.g. kv-contextforge-dev
    clientID: "<AZURE_DEVOPS_MCP_IDENTITY_CLIENT_ID>"   # Bicep output azureDevOpsMcpIdentityClientId —
                                                          # NOT csiDriverIdentityObjectId, NOT the
                                                          # GitHub MCP identity, see note above
    # ──────────────────────────────────────────────────────────────────────────

    usePodIdentity: "false"
    useVMManagedIdentity: "false"        # workload identity (OIDC) preferred
    cloudName: ""

    objects: |
      array:
        - |
          objectName: azure-devops-mcp-pat
          objectType: secret
          objectAlias: azure-devops-mcp-pat

  # Sync into a Secret scoped to this one workload — referenced via
  # secretKeyRef in infra/k8s/azure-devops-mcp-server.yaml, not envFrom, so
  # the pod only ever gets the one key it needs.
  secretObjects:
    - secretName: azure-devops-mcp-secrets
      type: Opaque
      data:
        - objectName: azure-devops-mcp-pat
          key: PERSONAL_ACCESS_TOKEN
