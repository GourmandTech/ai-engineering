# SecretProviderClass — Key Vault CSI integration for dev-agent (Phase 6.1.1).
#
# Same one-SecretProviderClass-per-workload pattern as sre-agent-secrets-provider.yaml.
# Same two secrets as sre-agent:
#   - anthropic-api-key   — reused as-is, same Anthropic Console key already in
#     KV for sre-agent. Not a new secret to create.
#   - dev-agent-jwt-token — the team+server-scoped ContextForge token for
#     dev-agent, minted via `make mcp-create-scoped-token` scoped to dev-team +
#     the dev-tools virtual server (not sre-team/sre-full — see CLAUDE.md
#     Phase 6.1.1 for why this must not reuse sre-agent's token).
#
# Prerequisites:
#   - AKS deployed with azureKeyvaultSecretsProvider add-on (set by Bicep)
#   - Dedicated identity `devAgentIdentity` (infra/bicep/modules/workload-identity.bicep,
#     instantiated in main.bicep). Run `make bicep-deploy` to provision it, then:
#       az identity show -g rg-contextforge-dev -n id-dev-agent --query clientId -o tsv
#     (make dev-agent-deploy does this lookup automatically, same as sre-agent-deploy.)
#   - Key Vault populated with dev-agent-jwt-token (set by mcp-create-scoped-token);
#     anthropic-api-key already exists from Phase 5.2, no action needed.
#
# Apply BEFORE running dev-agent-deploy:
#   kubectl apply -f infra/k8s/dev-agent-secrets-provider.yaml -n mcp

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: dev-agent-kv-secrets
  namespace: mcp
spec:
  provider: azure

  parameters:
    # ── REPLACE THESE THREE VALUES ───────────────────────────────────────────
    tenantId: "<TENANT_ID>"                    # az account show --query tenantId -o tsv
    keyvaultName: "<KV_NAME>"                  # e.g. kv-contextforge-dev
    clientID: "<DEV_AGENT_IDENTITY_CLIENT_ID>" # Bicep output devAgentIdentityClientId
    # ──────────────────────────────────────────────────────────────────────────

    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    cloudName: ""

    objects: |
      array:
        - |
          objectName: anthropic-api-key
          objectType: secret
          objectAlias: anthropic-api-key
        - |
          objectName: dev-agent-jwt-token
          objectType: secret
          objectAlias: dev-agent-jwt-token

  secretObjects:
    - secretName: dev-agent-secrets
      type: Opaque
      data:
        - objectName: anthropic-api-key
          key: ANTHROPIC_API_KEY
        - objectName: dev-agent-jwt-token
          key: DEV_AGENT_JWT
