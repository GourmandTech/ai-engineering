# SecretProviderClass — Key Vault CSI integration for ContextForge
#
# Prerequisites:
#   - AKS deployed with azureKeyvaultSecretsProvider add-on (set by Bicep)
#   - Key Vault populated with the secrets listed below
#   - CSI driver identity granted "Key Vault Secrets User" on the vault (set by Bicep)
#
# Apply BEFORE running helm-aks:
#   kubectl apply -f infra/k8s/secret-provider-class.yaml -n mcp
#
# How it works:
#   1. The CSI driver mounts KV secrets as files onto any pod that references this class.
#   2. The `secretObjects` block syncs those files into a Kubernetes Secret named
#      `contextforge-secrets` in the `mcp` namespace.
#   3. The ContextForge pods consume that k8s Secret as environment variables
#      (configured in values.azure.yaml via `extraEnv[].valueFrom.secretKeyRef`).
#
# Replace the three placeholder values before applying:
#   TENANT_ID   : az account show --query tenantId -o tsv
#   KV_NAME     : output from `make bicep-deploy` (keyVaultName)
#   CLIENT_ID   : output from `make bicep-deploy` (csiDriverIdentityObjectId) ...
#                 or use the kubelet identity client ID for simplified auth.
#
# Populate Key Vault secrets first:
#   KV=kv-contextforge-dev
#   az keyvault secret set --vault-name $KV --name jwt-secret-key        --value "$(openssl rand -base64 32)"
#   az keyvault secret set --vault-name $KV --name auth-encryption-secret --value "$(openssl rand -base64 32)"
#   az keyvault secret set --vault-name $KV --name platform-admin-email  --value "admin@yourorg.com"
#   az keyvault secret set --vault-name $KV --name platform-admin-password --value "$(openssl rand -base64 24)"
#   az keyvault secret set --vault-name $KV --name default-user-password  --value "$(openssl rand -base64 24)"

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: contextforge-kv-secrets
  namespace: mcp
spec:
  provider: azure

  parameters:
    # ── REPLACE THESE THREE VALUES ──────────────────────────────────────────
    tenantId: "<TENANT_ID>"              # az account show --query tenantId -o tsv
    keyvaultName: "<KV_NAME>"           # e.g. kv-contextforge-dev
    clientID: "<CSI_DRIVER_CLIENT_ID>"  # output: csiDriverIdentityObjectId (from Bicep)
    # ────────────────────────────────────────────────────────────────────────

    usePodIdentity: "false"
    useVMManagedIdentity: "false"       # workload identity (OIDC) preferred
    cloudName: ""                        # AzurePublicCloud (default)

    # Each object maps a Key Vault secret to a file inside the pod.
    # alias → the filename used in secretObjects below.
    objects: |
      array:
        - |
          objectName: jwt-secret-key
          objectType: secret
          objectAlias: jwt-secret-key
        - |
          objectName: auth-encryption-secret
          objectType: secret
          objectAlias: auth-encryption-secret
        - |
          objectName: platform-admin-email
          objectType: secret
          objectAlias: platform-admin-email
        - |
          objectName: platform-admin-password
          objectType: secret
          objectAlias: platform-admin-password
        - |
          objectName: default-user-password
          objectType: secret
          objectAlias: default-user-password

  # Sync KV secrets into a Kubernetes Secret so pods can consume them as envFrom.
  # The Secret is kept in sync — when KV secrets rotate, k8s Secret updates automatically
  # (per rotationPollInterval set in the AKS add-on config).
  secretObjects:
    - secretName: contextforge-secrets
      type: Opaque
      data:
        - objectName: jwt-secret-key
          key: JWT_SECRET_KEY
        - objectName: auth-encryption-secret
          key: AUTH_ENCRYPTION_SECRET
        - objectName: platform-admin-email
          key: PLATFORM_ADMIN_EMAIL
        - objectName: platform-admin-password
          key: PLATFORM_ADMIN_PASSWORD
        - objectName: default-user-password
          key: DEFAULT_USER_PASSWORD
